receivers:
  otlp:
    protocols:
      grpc: 
        endpoint: 0.0.0.0:4317
      http: 
        endpoint: 0.0.0.0:4318

extensions:
exporters:
  otlphttp:
    traces_endpoint: "jaeger.railway.internal:4317"
  debug/detailed:
    verbosity: detailed
  elasticsearch:
    endpoints: ["https://elasticsearch-production-215d.up.railway.app"]
    logs_index: logs-otel
    tls:
      insecure: true

processors:
  batch:

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug/detailed, otlphttp]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug/detailed]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug/detailed, elasticsearch]
